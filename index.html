<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#06080a">
<title>🚪 Klingeln</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚪%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070d;--card:#0a0e16;--text:#e0e8f0;--dim:#6b7a90;
  --neon:#00FFAA;--cyan:#00B4FF;--purple:#8C00FF;--pink:#FF0080;
  --ok:#00cc66;--err:#e05555;--warn:#FFAA00;
  --shadow-cyan:0 0 30px rgba(0,180,255,.3);
  --shadow-pink:0 6px 40px rgba(255,0,128,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;color-scheme:dark;}
body{font-family:'Outfit',system-ui,sans-serif;background:radial-gradient(ellipse at top,#0a1230 0%,#04070d 65%);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden;}

/* Hintergrund-Effekte: schwebende Partikel */
.bg-particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.bg-particles span{position:absolute;display:block;width:3px;height:3px;background:var(--cyan);border-radius:50%;opacity:.4;animation:floatUp 12s linear infinite;box-shadow:0 0 8px var(--cyan);}
@keyframes floatUp{from{transform:translateY(110vh) scale(.5);opacity:0;}10%{opacity:.6;}90%{opacity:.3;}to{transform:translateY(-10vh) scale(1);opacity:0;}}

.container{width:100%;max-width:460px;background:linear-gradient(180deg,rgba(14,20,30,.95),rgba(8,12,18,.95));border:1px solid rgba(0,180,255,.25);border-radius:22px;padding:34px 28px 28px;box-shadow:var(--shadow-cyan),inset 0 1px 0 rgba(255,255,255,.04);position:relative;z-index:1;backdrop-filter:blur(10px);}
.container::before{content:'';position:absolute;top:-1px;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),var(--pink),var(--neon),transparent);border-radius:22px 22px 0 0;animation:shimmer 4s linear infinite;background-size:200% 100%;}
@keyframes shimmer{from{background-position:100% 0;}to{background-position:-100% 0;}}

header{text-align:center;margin-bottom:22px;position:relative;}
.brand-line{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:14px;opacity:.7;}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px;background:radial-gradient(circle,rgba(0,180,255,.15) 0%,transparent 70%);border-radius:50%;margin-bottom:6px;position:relative;}
.icon-wrap::before{content:'';position:absolute;inset:-8px;border:2px solid rgba(0,180,255,.4);border-radius:50%;animation:pulseRing 2.4s ease-out infinite;}
.icon-wrap::after{content:'';position:absolute;inset:-8px;border:2px solid rgba(0,180,255,.4);border-radius:50%;animation:pulseRing 2.4s ease-out infinite 1.2s;}
@keyframes pulseRing{0%{transform:scale(.8);opacity:1;}100%{transform:scale(1.4);opacity:0;}}
.icon{font-size:3.4rem;filter:drop-shadow(0 0 14px rgba(0,255,170,.7));position:relative;z-index:1;}
h1{font-family:'Outfit',sans-serif;font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,var(--neon) 0%,var(--cyan) 50%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:8px 0 4px;letter-spacing:-.02em;}
.sub{color:var(--dim);font-size:.95rem;}
.sub b{color:var(--text);font-weight:700;}

#status{margin:18px 0 22px;text-align:center;font-size:.78rem;padding:9px 14px;border-radius:8px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:8px;}
.status-ok{background:rgba(0,204,102,.08);color:var(--ok);border:1px solid rgba(0,204,102,.3);}
.status-warn{background:rgba(255,170,0,.08);color:var(--warn);border:1px solid rgba(255,170,0,.3);}
.status-err{background:rgba(224,85,85,.08);color:var(--err);border:1px solid rgba(224,85,85,.3);}
.status-load{background:rgba(0,180,255,.08);color:var(--cyan);border:1px solid rgba(0,180,255,.3);}
.status-dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.field{margin-bottom:14px;}
.field label{display:block;font-size:.72rem;font-family:'JetBrains Mono',monospace;color:var(--cyan);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;opacity:.85;}
.field input,.field textarea{width:100%;background:rgba(0,0,0,.4);color:var(--text);border:1px solid rgba(0,180,255,.2);border-radius:10px;padding:12px 14px;font-size:.95rem;font-family:inherit;outline:none;transition:all .2s;}
.field input::placeholder,.field textarea::placeholder{color:rgba(107,122,144,.6);}
.field input:focus,.field textarea:focus{border-color:var(--cyan);background:rgba(0,0,0,.55);box-shadow:0 0 0 3px rgba(0,180,255,.12);}
.field textarea{resize:vertical;min-height:62px;}

.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .25s,opacity .2s;font-family:'Outfit',sans-serif;margin-bottom:11px;text-decoration:none;color:inherit;letter-spacing:.3px;position:relative;overflow:hidden;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.35;cursor:not-allowed;}

.btn-ring{background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 100%);color:#fff;font-weight:900;font-size:1.2rem;padding:20px;letter-spacing:.5px;text-transform:uppercase;box-shadow:var(--shadow-pink);position:relative;}
.btn-ring::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:slideShine 2.5s ease-in-out infinite;}
@keyframes slideShine{0%{left:-100%;}50%{left:100%;}100%{left:100%;}}
.btn-ring:not(:disabled):hover{box-shadow:0 8px 50px rgba(255,0,128,.6);transform:translateY(-2px);}

.btn-call{background:rgba(0,204,102,.1);color:var(--ok);border:1.5px solid rgba(0,204,102,.4);}
.btn-call:hover{background:rgba(0,204,102,.18);box-shadow:0 4px 20px rgba(0,204,102,.25);}
.btn-wa{background:rgba(37,211,102,.1);color:#25D366;border:1.5px solid rgba(37,211,102,.4);}
.btn-wa:hover{background:rgba(37,211,102,.18);box-shadow:0 4px 20px rgba(37,211,102,.25);}

.divider{margin:20px 0 12px;text-align:center;color:var(--dim);font-size:.62rem;letter-spacing:3px;font-family:'JetBrains Mono',monospace;position:relative;text-transform:uppercase;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:34%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,.3),transparent);}
.divider::before{left:0;}
.divider::after{right:0;}

.hint{font-size:.7rem;color:var(--dim);text-align:center;margin-top:18px;line-height:1.6;font-family:'JetBrains Mono',monospace;}
.hint b{color:var(--text);}
.brand-footer{margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,180,255,.1);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-align:center;opacity:.65;}
.brand-footer .nova{background:linear-gradient(90deg,var(--neon),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);border:1px solid var(--cyan);color:var(--text);padding:14px 22px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.7);font-size:.92rem;z-index:9999;opacity:0;transition:all .35s cubic-bezier(.2,.8,.2,1);font-family:'JetBrains Mono',monospace;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--ok);box-shadow:0 8px 30px rgba(0,204,102,.4);}
.toast.err{border-color:var(--err);box-shadow:0 8px 30px rgba(224,85,85,.4);}
.toast.warn{border-color:var(--warn);box-shadow:0 8px 30px rgba(255,170,0,.4);}

@media(max-width:380px){.container{padding:26px 20px 22px;}h1{font-size:1.55rem;}.icon{font-size:2.8rem;}.icon-wrap{width:74px;height:74px;}.btn-ring{font-size:1.05rem;padding:17px;}}
</style>
</head>
<body>

<div class="bg-particles" aria-hidden="true">
    <span style="left:5%;animation-delay:0s;"></span>
    <span style="left:15%;animation-delay:2s;background:var(--neon);box-shadow:0 0 8px var(--neon);"></span>
    <span style="left:30%;animation-delay:5s;background:var(--purple);box-shadow:0 0 8px var(--purple);"></span>
    <span style="left:45%;animation-delay:1s;"></span>
    <span style="left:60%;animation-delay:3s;background:var(--neon);box-shadow:0 0 8px var(--neon);"></span>
    <span style="left:75%;animation-delay:6s;background:var(--pink);box-shadow:0 0 8px var(--pink);"></span>
    <span style="left:88%;animation-delay:4s;"></span>
</div>

<div class="container">
    <header>
        <div class="brand-line">⬟ Neural Visitor Interface</div>
        <div class="icon-wrap">
            <div class="icon">🚪</div>
        </div>
        <h1>Klingeln</h1>
        <div class="sub">bei <b id="owner">Gerd</b></div>
    </header>

    <div id="status" class="status-load"><span class="status-dot"></span><span id="status-text">Verbinde mit NOVA …</span></div>

    <div class="field">
        <label for="vname">Wer bist du?</label>
        <input type="text" id="vname" placeholder="DHL · Max · Pizza · Nachbar" maxlength="50" autocomplete="name">
    </div>
    <div class="field">
        <label for="vmsg">Anliegen</label>
        <textarea id="vmsg" placeholder="Paket abgeben · ich bin's, der Nachbar …" maxlength="200"></textarea>
    </div>

    <button type="button" class="btn btn-ring" id="btn-ring" disabled>🔔 KLINGELN</button>

    <div class="divider">— ODER —</div>

    <a class="btn btn-call" id="btn-call" href="#" target="_blank" rel="noopener" style="display:none;">📞 Direkt anrufen</a>
    <a class="btn btn-wa" id="btn-wa" href="#" target="_blank" rel="noopener" style="display:none;">💬 WhatsApp</a>

    <div class="hint">
        <span id="ownerHint">Gerd</span> bekommt sofort eine Live-Benachrichtigung mit deinem Namen + Anliegen.
    </div>
    <div class="brand-footer">
        powered by <span class="nova">NOVA</span> · GZ-AI.-Stacks
    </div>
</div>

<script>
(async function() {
    const params = new URLSearchParams(location.search);
    const owner = params.get('owner') || 'Gerd';
    const token = params.get('token') || '';
    const phone = params.get('phone') || '';

    document.getElementById('owner').textContent = owner;
    document.getElementById('ownerHint').textContent = owner;
    document.title = '🚪 Klingeln bei ' + owner;

    if (phone) {
        document.getElementById('btn-call').href = 'tel:' + phone;
        document.getElementById('btn-call').style.display = 'flex';
        document.getElementById('btn-wa').href = 'https://wa.me/' + phone.replace(/\D/g,'');
        document.getElementById('btn-wa').style.display = 'flex';
    }

    const status = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    function setStatus(text, cls){
        statusText.textContent = text;
        status.className = cls;
    }

    let novaUrl = null;
    let online = false;
    try {
        const r = await fetch('tunnel.json?_=' + Date.now(), { cache: 'no-store' });
        const cfg = await r.json();
        novaUrl = cfg.nova_url;
        try {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 6000);
            const ping = await fetch(novaUrl + '/api/tuerklingel/config', { signal: ctrl.signal });
            clearTimeout(t);
            if (ping.ok) online = true;
        } catch (e) {}
    } catch (e) {}

    if (online) {
        setStatus('NOVA online · ' + owner + ' ist erreichbar', 'status-ok');
        document.getElementById('btn-ring').disabled = false;
    } else if (novaUrl) {
        setStatus('NOVA gerade nicht erreichbar', 'status-warn');
    } else {
        setStatus('Konfiguration fehlt — bitte direkt anrufen', 'status-err');
    }

    function showToast(text, type) {
        const t = document.createElement('div');
        t.className = 'toast ' + (type || '');
        t.textContent = text;
        document.body.appendChild(t);
        requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 4500);
    }

    document.getElementById('btn-ring').addEventListener('click', async () => {
        if (!novaUrl || !online) return;
        const btn = document.getElementById('btn-ring');
        const origText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '⏳ Klingelt …';
        try {
            const r = await fetch(novaUrl + '/api/tuerklingel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    name: document.getElementById('vname').value,
                    message: document.getElementById('vmsg').value
                })
            });
            const d = await r.json();
            if (d.success) {
                btn.textContent = '✓ ' + (d.ownerName || owner) + ' wurde benachrichtigt!';
                btn.style.background = 'linear-gradient(135deg,var(--ok),var(--cyan))';
                showToast('🔔 Klingel gesendet — bitte warten', 'ok');
                if (d.quiet) showToast('🌙 Quiet-Hours aktiv', 'warn');
                // Sound auf Besucher-Handy abspielen falls vom Server konfiguriert
                if (d.visitorSoundUrl) {
                    try {
                        const audio = new Audio(novaUrl + d.visitorSoundUrl);
                        audio.volume = 0.85;
                        audio.play().catch(()=>{}); // still failen wenn Browser blockt
                    } catch (e) {}
                }
                // Walkie-Talkie: auf Audio-Chunks vom Hausherrn lauschen
                if (d.ringId) startVoiceListen(d.ringId, d.voiceWindowSec || 60);
            } else if (r.status === 429) {
                btn.textContent = origText;
                btn.disabled = false;
                if (d.needNewCode) {
                    showToast('⛔ ' + (d.error || 'Bitte frischen QR-Code scannen'), 'err');
                } else if (d.waitSeconds) {
                    showToast('⏳ Bitte ' + d.waitSeconds + ' Sek warten', 'warn');
                } else if (d.waitMinutes) {
                    showToast('⏳ Bitte ' + d.waitMinutes + ' Min warten', 'warn');
                } else {
                    showToast(d.error || 'Zu viele Klingeln', 'warn');
                }
            } else if (r.status === 403) {
                btn.textContent = origText;
                btn.disabled = false;
                showToast('🚫 ' + (d.error || 'Gesperrt'), 'err');
            } else {
                btn.textContent = origText;
                btn.disabled = false;
                showToast('Fehler: ' + (d.error || 'unbekannt'), 'err');
            }
        } catch (e) {
            btn.textContent = origText;
            btn.disabled = false;
            showToast('Verbindung fehlgeschlagen', 'err');
        }
    });

    // ===== Walkie-Talkie: Audio vom Hausherrn empfangen + Antworten senden =====
    let voiceListenAbort = null;
    let replyRecorder = null;
    let replyStream = null;

    async function startVoiceListen(ringId, windowSec) {
        if (voiceListenAbort) { voiceListenAbort.abort(); voiceListenAbort = null; }
        voiceListenAbort = new AbortController();
        const stopAt = Date.now() + (windowSec * 1000);

        // Banner mit Antwort-Button
        let banner = document.getElementById('voice-banner');
        if (banner) banner.remove();
        banner = document.createElement('div');
        banner.id = 'voice-banner';
        banner.style.cssText = 'position:fixed;top:14px;left:14px;right:14px;background:linear-gradient(135deg,#8C00FF,#00B4FF);color:#fff;padding:12px 14px;border-radius:10px;font-family:JetBrains Mono,monospace;font-size:.78rem;text-align:center;z-index:9999;box-shadow:0 4px 20px rgba(140,0,255,.4);font-weight:700;display:flex;flex-direction:column;gap:8px;align-items:center;';
        banner.innerHTML = '<div>🎙 Verbindung offen — Hausherr kann sprechen</div>' +
            '<button id="reply-btn" style="background:rgba(255,255,255,.2);border:2px solid #fff;color:#fff;border-radius:8px;padding:8px 18px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;">🎤 Antworten</button>';
        document.body.appendChild(banner);

        const replyBtn = banner.querySelector('#reply-btn');
        replyBtn.addEventListener('click', () => toggleReply(ringId, replyBtn));

        // Poll-Loop fuer eingehende Chunks
        try {
            while (Date.now() < stopAt) {
                const r = await fetch(novaUrl + '/api/tuerklingel/voice-listen/' + encodeURIComponent(ringId), { signal: voiceListenAbort.signal });
                if (r.status === 204) continue;
                if (!r.ok) { await new Promise(rs => setTimeout(rs, 500)); continue; }
                const blob = await r.blob();
                if (blob.size === 0) continue;
                const audio = new Audio(URL.createObjectURL(blob));
                audio.volume = 1.0;
                audio.play().catch(()=>{});
            }
        } catch (e) {}

        // Aufraeumen
        stopReply();
        if (banner && banner.parentElement) banner.remove();
        voiceListenAbort = null;
    }

    async function toggleReply(ringId, btn) {
        if (replyRecorder) { stopReply(); btn.textContent = '🎤 Antworten'; btn.style.background = 'rgba(255,255,255,.2)'; return; }
        try {
            replyStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                       : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
            replyRecorder = new MediaRecorder(replyStream, { mimeType: mime, audioBitsPerSecond: 32000 });
            replyRecorder.ondataavailable = async ev => {
                if (!ev.data || ev.data.size === 0) return;
                try {
                    await fetch(novaUrl + '/api/tuerklingel/reply-send/' + encodeURIComponent(ringId), {
                        method: 'POST', headers: { 'Content-Type': mime }, body: ev.data
                    });
                } catch (e) {}
            };
            replyRecorder.start(500);
            btn.textContent = '🔴 LIVE — Klick zum Stoppen';
            btn.style.background = 'rgba(255,68,102,.45)';
            btn.style.borderColor = '#ff8888';
        } catch (e) {
            alert('Mikrofon-Fehler: ' + e.message);
            stopReply();
        }
    }

    function stopReply() {
        if (replyRecorder && replyRecorder.state !== 'inactive') { try { replyRecorder.stop(); } catch(e){} }
        if (replyStream) { try { replyStream.getTracks().forEach(t => t.stop()); } catch(e){} }
        replyRecorder = null;
        replyStream = null;
    }
})();
</script>
</body>
</html>
